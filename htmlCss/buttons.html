<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width
    , initial-scale=1.0">
    <title>Buttons CSS</title>
    <link rel="stylesheet" href="buttons.css">
</head>

<body>
    <section class="panel">
        <section class="normal">
            <h2 class="firstheader">Normal buttons</h2>
            <button class="leftmostbutton">Learn More</button>
            <button>Learn More</button>
            <button>Learn More</button>
        </section>
        <section class="filled">
            <h2 class="otherheaders">Filled buttons</h2>
            <button class="leftmostbutton">Learn More</button>
            <button>Learn More</button>
            <button>Learn More</button>
        </section>
        <section class="icon">
            <h2 class="otherheaders">Icon buttons</h2>
            <button class="leftmostbutton"><img src="images/download (2).png" alt="download icon" />Download</button>
            <button><img src="images/download (2).png" alt="download icon" />Download</button>
            <button><img src="images/download (2).png" alt="download icon" />Download</button>
        </section>
    </section>


</body>

</html>
